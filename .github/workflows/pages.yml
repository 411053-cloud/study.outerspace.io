name: GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    concurrency:
      group: 'pages'
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v1
        with:
          path: './'
      - uses: actions/deploy-pages@v1
